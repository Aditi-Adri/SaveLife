# Render Blueprint for SaveLife
# One web service (Express serving the built React app) + a managed PostgreSQL
# database. In the Render dashboard: New > Blueprint, point it at this repo, and
# everything below is provisioned automatically.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: savelife-db
    databaseName: savelife
    user: savelife
    plan: free

services:
  - type: web
    name: savelife
    runtime: node
    plan: free
    # Install both apps and build the frontend bundle.
    buildCommand: bash build.sh
    # Start the API, which also serves frontend/dist in production.
    startCommand: node backend/src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PGSSL
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: savelife-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true   # Render generates a strong secret automatically
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_OPTIONS
        value: "--dns-result-order=ipv4first"
